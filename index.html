<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/webicon/dark/Frame 28 (1).png" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aadit Ajay | Creative Developer & Community Lead</title>
    <meta name="description" content="Aadit Ajay - Community Builder, Project Manager, Strategist." />
    
    <!-- Instant Theme Check -->
    <script>
      (function() {
          const savedTheme = localStorage.getItem('theme') || 'dark-mode';
          if (savedTheme === 'dark-mode') {
              document.documentElement.classList.add('dark-theme-active');
          }
      })();
    </script>
    <style>
      .dark-theme-active body { background-color: #050505 !important; color: #f5f5f7 !important; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
      @font-face {
          font-family: 'LandingFont';
          src: url('/public/font/hero/enigma.otf') format('opentype');
          font-weight: normal;
          font-style: normal;
      }
      @font-face {
          font-family: 'Gilroy';
          font-style: normal;
          font-weight: 700;
          src: url('https://fonts.cdnfonts.com/s/16219/Gilroy-Bold.woff') format('woff');
      }
      @font-face {
          font-family: 'Gilroy';
          font-style: normal;
          font-weight: 900;
          src: url('https://fonts.cdnfonts.com/s/16219/Gilroy-Heavy.woff') format('woff');
      }
    </style>
  </head>
  <body class="dark-mode">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
